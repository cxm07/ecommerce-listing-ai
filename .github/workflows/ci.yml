name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: pytest -q
        working-directory: backend

  database-schema:
    name: Database schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.81.1
      - run: supabase start
      - run: supabase db reset --local
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run Postgres repository integration tests
        working-directory: backend
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: pytest -q tests/integration
      - name: Run schema assertions through local Postgres
        run: |
          db_container="$(docker ps --format '{{.Names}}' | grep '^supabase_db_' | head -n 1)"
          test -n "$db_container"
          docker cp supabase/tests/v23_schema_validation.sql "$db_container:/tmp/v23_schema_validation.sql"
          docker exec "$db_container" psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f /tmp/v23_schema_validation.sql
      - run: python scripts/validate_v23_schema.py
