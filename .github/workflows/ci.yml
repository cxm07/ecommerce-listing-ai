name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: pytest -q -m "not postgres_integration and not storage_integration"
        working-directory: backend

  database-schema:
    name: Database schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.81.1
      - run: supabase start
      - run: supabase db reset --local
      - name: Export disposable local Supabase connection settings
        run: supabase status -o env | sed -E 's/^([A-Z_]+)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run Postgres repository integration tests
        working-directory: backend
        env:
          SUPABASE_DB_URL: ${{ env.DB_URL }}
          DATA_REPOSITORY: postgres
          APP_ENV: test
        run: pytest -q -m postgres_integration
      - name: Run Supabase Storage integration tests
        working-directory: backend
        env:
          SUPABASE_DB_URL: ${{ env.DB_URL }}
          SUPABASE_URL: ${{ env.API_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: task-files
          FILE_STORAGE: supabase
          DATA_REPOSITORY: postgres
          APP_ENV: test
        run: pytest -q -m storage_integration
      - name: Run schema assertions through local Postgres
        run: |
          db_container="$(docker ps --format '{{.Names}}' | grep '^supabase_db_' | head -n 1)"
          test -n "$db_container"
          docker cp supabase/tests/v23_schema_validation.sql "$db_container:/tmp/v23_schema_validation.sql"
          docker exec "$db_container" psql -U postgres -d postgres -v ON_ERROR_STOP=1 -f /tmp/v23_schema_validation.sql
      - run: python scripts/validate_v23_schema.py
